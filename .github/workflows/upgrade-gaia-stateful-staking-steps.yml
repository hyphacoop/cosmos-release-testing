---

name: Test Gaia Stateful Upgrade Staking Steps
on:
  workflow_call:
    inputs:
      runs-on-os:
        required: true
        type: string
      gaia_version:
        required: true
        type: string
      upgrade_version:
        required: true
        type: string
      archive_url:
        required: true
        type: string
      
jobs:
  test-upgrade:
    runs-on: ${{ inputs.runs-on-os }}
    env:
      SSH_KEYS: ${{ vars.SSH_KEYS }}
      CHAIN_BINARY: gaiad
      RUNNING_VERSION: v27.2.0
      UPGRADE_NAME: v28.0.0
      PERSISTENT_PEERS: 6a40fcafbf98a8d0cae4437c76486a6cb88576dc@one.cosmos-mainnet.polypore.xyz:26656,d09265f7e2b854435a800b15ecabf591a8426994@sentry-01.cosmoshub-4.polypore.xyz:26656
      SYNC_RPC_1: https://rpc.sentry-01.cosmoshub-4.polypore.xyz:443
      SYNC_RPC_2: https://rpc.sentry-01.cosmoshub-4.polypore.xyz:443
      ADDRBOOK_URL: https://snapshots.polkachu.com/addrbook/cosmos/addrbook.json
      
    steps:
      # Get system info
      - name: Install required packages
        run: |
          sudo apt update
          sudo apt dist-upgrade -y
          sudo apt -y install python-is-python3 screen curl jq wget python3-venv python3-pip bc git psmisc build-essential net-tools vim htop lz4 aria2
      - run: ifconfig
      - run: lscpu
      - run: df -h
      - run: free -m
      - run: uname -a
      - run: lsb_release -a
      - run: echo "GitHub branch is ${{ github.ref }}"
      - run: whoami
      - run: pwd
      - name: mkdir ~/artifact
        run: mkdir ~/artifact
      - name: Update Apt
        run: |
          sudo apt update
          sudo apt dist-upgrade -y
      - name: Install openssh-server
        run: |
          sudo apt install -y openssh-server
          sudo mkdir /run/sshd
          sudo /usr/sbin/sshd
      - name: Setup SSH auth
        run: |
          if [ ! -d ~/.ssh ]
          then
            mkdir -m 700 ~/.ssh
          fi
          echo "$SSH_KEYS" > ~/.ssh/authorized_keys
      - name: start-version
        run: echo ${{inputs.gaia_version}}
      - name: target-version
        run: echo ${{inputs.upgrade_version}}
      - name: target-commit
        if: ${{ inputs.upgrade_version == 'main' }}
        run: |
          BUILD_TAG=gaiad-linux-${{inputs.upgrade_version}}
          TARGET_COMMIT=$(curl -s -L -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/hyphacoop/cosmos-builds/releases/tags/$BUILD_TAG | jq -r '.name')
          echo TARGET_COMMIT: $TARGET_COMMIT
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.3
      - name: Update PATH
        run: |
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Init Python venv
        run: python -m venv ~/env
      - name: Install dependencies
        run: |
          source ~/env/bin/activate
          python -m pip install --upgrade pip
          python -m pip install toml-cli graph-cli cosmospy requests asyncio websockets urllib3 bech32
      
      - name: Download binary from cosmos/gaia repo
        run: |
          sudo wget -nv https://github.com/cosmos/gaia/releases/download/${{ env.RUNNING_VERSION }}/gaiad-${{ env.RUNNING_VERSION }}-linux-amd64 -O /usr/local/bin/gaiad
          sudo chmod +x /usr/local/bin/gaiad
      - name: Initializing chain to sync with mainnet
        env:
          NODE_HOME: /home/runner/.gaia
          NODE_MONIKER: mainnet-export
          SERVICE_NAME: mainnet-export
          CHAIN_ID: cosmoshub-4
          CHAIN_BINARY: 'gaiad'
          GENESIS_URL: https://github.com/cosmos/mainnet/raw/master/genesis/genesis.cosmoshub-4.json.gz
          GAS_PRICES: "0.0025uatom"
        run: |
          source ~/env/bin/activate
          set -e
          echo "Initializing $NODE_HOME..."
          $CHAIN_BINARY config set client chain-id $CHAIN_ID --home $NODE_HOME
          $CHAIN_BINARY config set client keyring-backend test --home $NODE_HOME
          $CHAIN_BINARY config set client broadcast-mode sync --home $NODE_HOME
          $CHAIN_BINARY init $NODE_MONIKER --chain-id $CHAIN_ID --home $NODE_HOME
          sed -i -e "/^persistent_peers =/ s^= .*^= \"${{ env.PERSISTENT_PEERS }}\"^" $NODE_HOME/config/config.toml
          echo "Configuring state sync..."
          CURRENT_BLOCK=$(curl -s ${{ env.SYNC_RPC_1 }}/block | jq -r '.result.block.header.height')
          TRUST_HEIGHT=$[$CURRENT_BLOCK-1000]
          TRUST_BLOCK=$(curl -s ${{ env.SYNC_RPC_1 }}/block\?height\=$TRUST_HEIGHT)
          TRUST_HASH=$(echo $TRUST_BLOCK | jq -r '.result.block_id.hash')
          sed -i -e '/enable =/ s/= .*/= true/' $NODE_HOME/config/config.toml
          sed -i -e '/trust_period =/ s/= .*/= "8h0m0s"/' $NODE_HOME/config/config.toml
          sed -i -e "/trust_height =/ s/= .*/= $TRUST_HEIGHT/" $NODE_HOME/config/config.toml
          sed -i -e "/trust_hash =/ s/= .*/= \"$TRUST_HASH\"/" $NODE_HOME/config/config.toml
          sed -i -e "/rpc_servers =/ s^= .*^= \"${{ env.SYNC_RPC_1 }},${{ env.SYNC_RPC_2 }}\"^" $NODE_HOME/config/config.toml
          sed -i -e "/minimum-gas-prices =/ s^= .*^= \"$GAS_PRICES\"^" $NODE_HOME/config/app.toml
          toml set api.enable "true" --toml-path $NODE_HOME/config/app.toml
          # echo "${{ secrets.PRIV_VALIDATOR_KEY }}" | base64 --decode > $NODE_HOME/config/priv_validator_key.json
          # echo "${{ secrets.NODE_KEY }}" | base64 --decode > $NODE_HOME/config/node_key.json
          echo "Replaceing genesis..."
          wget -nv $GENESIS_URL -O genesis.json.gz
          gunzip genesis.json.gz
          mv genesis.json $NODE_HOME/config/genesis.json
      - name: Archive config files
        env:
          NODE_HOME: /home/runner/.gaia
        run: mkdir -p /home/runner/artifact/config/cosmoshub-4 && cp -rvp $NODE_HOME/config /home/runner/artifact/config/cosmoshub-4/
      # - name: Get archive url
      #   run: |
      #     # Node Stake
      #     SNAP_NAME=$(curl -s https://ss.cosmos.nodestake.org/ | egrep -o ">20.*\.tar.lz4" | tr -d ">")
      #     echo "ARCHIVE_URL=https://ss.cosmos.nodestake.org/${SNAP_NAME}" >> $GITHUB_ENV
      #     # Polkachu
      #     # SNAP_NAME=$(curl -s https://www.polkachu.com/tendermint_snapshots/cosmos | egrep -o "cosmos_20.*\.tar.lz4 https" | awk -F " " '{ print $1 }')
      #     # echo "ARCHIVE_URL=https://snapshots.polkachu.com/snapshots/cosmos/${SNAP_NAME}" >> $GITHUB_ENV
      - name: Get archive url
        run: |
          # Node Stake (works)
          # SNAP_NAME=$(curl -s https://ss-nodestake.eu-proxy.polypore.xyz/ | egrep -o ">20.*\.tar.lz4" | tr -d ">")
          # echo "ARCHIVE_URL=https://ss-nodestake.eu-proxy.polypore.xyz/${SNAP_NAME}" >> $GITHUB_ENV
          # Polkachu
          # SNAP_NAME=$(curl -s https://www.polkachu.com/tendermint_snapshots/cosmos | egrep -o "cosmos_20.*\.tar.lz4 https" | awk -F " " '{ print $1 }')
          # echo "ARCHIVE_URL=https://snapshots.polkachu.com/snapshots/cosmos/${SNAP_NAME}" >> $GITHUB_ENV
          # Hypha
          echo "ARCHIVE_URL=https://snapshots.polypore.xyz/cosmoshub-4/latest.tar.lz4"  >> $GITHUB_ENV
      - name: Download snapshot
        env:
          # STATESYNC_ENABLED: ${{ vars.STATESYNC_ENABLED }}
          STATESYNC_ENABLED: 0
        run: |
          set -e
          if [ "$STATESYNC_ENABLED" == "1" ]
          then
            echo "Statesync enabled, skip downloading snapshot..."
            exit 0
          else
            cd ~/.gaia
            echo "[INFO]: Downloading archive ${{ env.ARCHIVE_URL }}"
            # curl -o - -L ${{ env.ARCHIVE_URL }} | lz4 -d | tar vx -C .
            aria2c -x 8 -s 8 --out archive.tar.lz4 ${{ env.ARCHIVE_URL }}
            echo "[INFO]: Extracting archive..."
            lz4 -dc archive.tar.lz4 | tar  -xaf -
            echo "[INFO]: Cleanup..."
            rm archive.tar.lz4
          fi
      - name: Get addrbook
        run: curl -Ls ${{ env.ADDRBOOK_URL }} > /home/runner/.gaia/config/addrbook.json
      - name: Start Chain
        env:
          NODE_HOME: /home/runner/.gaia
          CHAIN_BINARY: 'gaiad'
        run: screen -L -Logfile /home/runner/artifact/gaiad_sync.log -S gaiad -d -m $CHAIN_BINARY start --home $NODE_HOME
      - name: Wait for gaiad to start and stabilize
        run: |
          tail -f /home/runner/artifact/gaiad_sync.log &
          tests/test_block_production.sh 127.0.0.1 26657 10 100000
      - name: Syncing Chain
        run: |
          catching_up="true"
          while [ $catching_up == "true" ]
          do
            catching_up=$(curl -s 127.0.0.1:26657/status | jq -r .result.sync_info.catching_up)
            echo "Still Syncing: $catching_up"
            sleep 5
          done
          echo "Done Syncing"
      - name: Validator set checks after initial sync
        run: |
          source ~/env/bin/activate
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          let current_block=$current_block-5
          current_validators=$(gaiad q comet-validator-set -o json | jq -r '.pagination.total')
          echo "[INFO]: Current block: $current_block"
          echo "[INFO]: Current validators: $current_validators"
          curl http://localhost:1317/cosmos/staking/v1beta1/params
          python scripts/ics_removal_validator_check.py --height $current_block --binary gaiad --api http://localhost:1317 --rpc http://localhost:26657 --provider-max-vals 180
          check_result=$(jq -r '.' validator-check-$current_block.json | grep FAIL || true)
          echo "Check result: $check_result"
          if [ -z "$check_result" ]; then
            echo "> PASS: Validator set check passed"
          else
            echo "> FAIL: Validator set check failed"
            jq -r '.' validator-check-$current_block.json | curl -s -H "x-uuid;" --upload-file - 'https://paste.c-net.org/'
            exit 0
          fi
      - name: Stop gaiad
        env:
          NODE_HOME: /home/runner/.gaia
          CHAIN_BINARY: 'gaiad'
        run: |
          echo "exiting gaia and screen"
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          killall gaiad screen
          sleep 10s
          let halt_height=$current_block+50
          echo "[INFO]: Set halt-height to $halt_height"
          sed -i -e "/halt-height =/ s^= .*^= $halt_height^" $NODE_HOME/config/app.toml
          echo "[INFO]: Start gaiad with halt-height"
          screen -L -Logfile /home/runner/artifact/gaiad_sync2.log -S gaiad -d -m $CHAIN_BINARY start --home $NODE_HOME
          sleep 1
          ( tail -f -n0 /home/runner/artifact/gaiad_sync2.log & ) | grep -q "CONSENSUS FAILURE"
          echo "exiting gaia and screen"
          killall gaiad screen
          tail -30 /home/runner/artifact/gaiad_sync2.log
          echo "[INFO]: Reset halt-height"
          sed -i -e "/halt-height =/ s^= .*^= 0^" $NODE_HOME/config/app.toml
          current_block=$halt_height
          echo "SNAPSHOT_HEIGHT=$current_block" >> $GITHUB_ENV
          sleep 10s
          rm $NODE_HOME/config/addrbook.json || true

      # - name: Build fork tool
      #   run: |
      #     cd /home/runner
      #     git clone https://github.com/cosmos/gaia.git
      #     cd gaia
      #     # git checkout ${{ env.RUNNING_VERSION }}
      #     git checkout ${{ vars.FORK_TOOL_TAG }}
      #     make build BUILD_TAGS="-tag unsafe_start_local_validator"
      #     cp build/gaiad /home/runner/go/bin/gaiad-fork
      - name: Download fork tool
        run: |
          wget -O /home/runner/go/bin/gaiad-fork https://github.com/hyphacoop/cosmos-builds/releases/download/v27.1.0-fork/gaiad
          chmod +x /home/runner/go/bin/gaiad-fork
      - name: Fork the chain
        env:
          NODE_HOME: /home/runner/.gaia
        run: |
          source ~/env/bin/activate
          set -e
          curl -L https://raw.githubusercontent.com/hyphacoop/cosmos-ansible/main/examples/validator-keys/validator-40/priv_validator_key.json > /home/runner/.gaia/config/priv_validator_key.json
          curl -L https://raw.githubusercontent.com/hyphacoop/cosmos-ansible/main/examples/validator-keys/validator-40/node_key.json > /home/runner/.gaia/config/node_key.json
          pubkey=$(jq -r .pub_key.value /home/runner/.gaia/config/priv_validator_key.json)
          privkey=$(jq -r .priv_key.value /home/runner/.gaia/config/priv_validator_key.json)
          sed -i -e "/^persistent_peers =/ s^= .*^= \"\"^" $NODE_HOME/config/config.toml
          sed -i -e '/enable =/ s/= .*/= false/' $NODE_HOME/config/config.toml
          sed -i -e "/trust_height =/ s/= .*/= 0/" $NODE_HOME/config/config.toml
          sed -i -e "/trust_hash =/ s/= .*/= \"\"/" $NODE_HOME/config/config.toml
          sed -i -e "/rpc_servers =/ s^= .*^= \"\"^" $NODE_HOME/config/config.toml
          toml set api.enable "true" --toml-path $NODE_HOME/config/app.toml
          screen -L -Logfile /home/runner/artifact/gaiad_fork.log -S gaiad -d -m /home/runner/go/bin/gaiad-fork --home /home/runner/.gaia testnet unsafe-start-local-validator \
          --validator-operator cosmosvaloper1r5v5srda7xfth3hn2s26txvrcrntldju7lnwmv \
          --validator-pubkey "$pubkey" \
          --validator-privkey "$privkey" \
          --accounts-to-fund cosmos1r5v5srda7xfth3hn2s26txvrcrntldjumt8mhl \
          --fund-amount 20000000000000000 \
          --validator-tokens 100000000000000000 \
          --auto-find-target
          screen -r gaiad -p0 -X logfile flush 0
      - name: Wait for gaiad to start and stabilize
        run: |
          tail -f /home/runner/artifact/gaiad_fork.log &
          tests/test_block_production.sh 127.0.0.1 26657 10 1000
      - name: Stop fork tool
        run: |
          echo "exiting gaia and screen"
          killall gaiad-fork screen
          sleep 10s
      - name: Archive running state for later tests
        run: |
          cd ~/
          tar cf test-archive.tar .gaia
          ls -alh test-archive.tar
      - name: Start gaiad
        run: |
          screen -L -Logfile /home/runner/artifact/gaiad_upgrade.log -S gaiad -d -m gaiad --home /home/runner/.gaia start
      - name: Wait for gaiad to start and stabilize
        run: |
          tail -f /home/runner/artifact/gaiad_upgrade.log &
          tests/test_block_production.sh 127.0.0.1 26657 10 1000
      - name: Validator set checks after fork
        run: |
          source ~/env/bin/activate
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          current_validators=$(gaiad q comet-validator-set -o json | jq -r '.pagination.total')
          let current_block=$current_block-5
          python scripts/ics_removal_validator_check.py --height $current_block --binary gaiad --api http://localhost:1317 --rpc http://localhost:26657 --provider-max-vals $current_validators
          check_result=$(jq -r '.' validator-check-$current_block.json | grep FAIL || true)
          echo "Check result: $check_result"
          if [ -z "$check_result" ]; then
            echo "> PASS: Validator set check passed"
          else
            echo "> FAIL: Validator set check failed"
            jq -r '.' validator-check-$current_block.json | curl -s -H "x-uuid;" --upload-file - 'https://paste.c-net.org/'
            exit 0
          fi
      - name: Restore val key
        run: |
          echo "Restoring validator key"
          echo "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon art" | gaiad --output json keys add val --keyring-backend test --recover > ~/.gaia/validator.json
      - name: Delegate to validator
        run: |
          echo "Delegate 10ATOM to validator."
          gaiad tx staking delegate cosmosvaloper1r5v5srda7xfth3hn2s26txvrcrntldju7lnwmv 10000000uatom --from val --keyring-backend test --fees 1000000uatom -y
          echo "Wait for the delegation to go on chain..."
          tests/test_block_production.sh 127.0.0.1 26657 1 10
      - name: Validator set checks after delegation
        run: |
          source ~/env/bin/activate
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          current_validators=$(gaiad q comet-validator-set -o json | jq -r '.pagination.total')
          let current_block=$current_block-5
          python scripts/ics_removal_validator_check.py --height $current_block --binary gaiad --api http://localhost:1317 --rpc http://localhost:26657 --provider-max-vals $current_validators
          check_result=$(jq -r '.' validator-check-$current_block.json | grep FAIL || true)
          echo "Check result: $check_result"
          if [ -z "$check_result" ]; then
            echo "> PASS: Validator set check passed"
          else
            echo "> FAIL: Validator set check failed"
            jq -r '.' validator-check-$current_block.json | curl -s -H "x-uuid;" --upload-file - 'https://paste.c-net.org/'
            exit 0
          fi

      - name: Get min_deposit
        run: |
          set -e
          gaiad q gov params -o json
          min_deposit=$(gaiad q gov params -o json | jq -r '.params.min_deposit[] | select(.denom=="uatom") | .amount')
          echo "MIN_DEPOSIT=$min_deposit" >> $GITHUB_ENV
      - name: Submit and vote on the upgrade proposal
        run: |
          set -e
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          upgrade_height=$(($current_block+20))
          echo "upgrade_height=$upgrade_height" >> $GITHUB_ENV
          echo "Submitting the upgrade proposal..."
          echo "Upgrade Name set to: ${{ env.UPGRADE_NAME }}"
          echo "Creating json proposal"
          jq ".messages[].plan .height=$upgrade_height | .messages[].plan .name=\"${{ env.UPGRADE_NAME }}\" | .deposit=\"${MIN_DEPOSIT}uatom\"" templates/proposal-software-upgrade.json > upgrade_prop.json
          proposal="gaiad --output json tx gov submit-proposal upgrade_prop.json --gas auto --gas-prices 1000uatom --gas-adjustment 3 --from val --yes"
          txhash=$($proposal | jq -r .txhash)
          echo "Wait for the proposal to go on chain..."
          tests/test_block_production.sh 127.0.0.1 26657 1 1
          echo "Get proposal ID from txhash: $txhash ..."
          gaiad q tx $txhash
          proposal_id=$(gaiad --output json q tx $txhash | jq -r '.events[] | select(.type=="submit_proposal") | .attributes[] | select(.key=="proposal_id") | .value')
          echo "Submitting the \"yes\" vote to proposal $proposal_id..."
          vote="gaiad tx gov vote $proposal_id yes --from val --keyring-backend test --fees 1000uatom --yes"
          $vote
          tests/test_block_production.sh 127.0.0.1 26657 1 1
      - name: Stop gaiad when reached upgrade height
        env:
          NODE_HOME: /home/runner/.gaia
          CHAIN_BINARY: 'gaiad'
        run: |
          source ~/env/bin/activate
          echo "Upgrade height is: ${{ env.upgrade_height }}"
          echo "Starting scripts/validator_carousel.py"
          python scripts/validator_carousel.py --binary $CHAIN_BINARY --home $NODE_HOME --api http://localhost:1317 --rpc http://localhost:26657 --chain-id cosmoshub-4 --prefund 30000000000000 --height $(($upgrade_height-1)) &
          ( tail -f -n0 /home/runner/artifact/gaiad_upgrade.log & ) | grep -q "CONSENSUS FAILURE"
          echo "exiting gaia and screen"
          killall gaiad screen
          tail -30 /home/runner/artifact/gaiad_upgrade.log

      - name: Download v28 binary
        run: |
          sudo wget https://github.com/hyphacoop/cosmos-builds/releases/download/v28-preview/gaiad -O /usr/local/bin/gaiad-v28
          sudo chmod +x /usr/local/bin/gaiad-v28
      - name: Start gaiad v28
        run: |
          screen -L -Logfile /home/runner/artifact/gaiad_test.log -S gaiad -d -m gaiad-v28 --home /home/runner/.gaia start
          tests/test_block_production.sh 127.0.0.1 26657 10 10
      - name: Print starting validator set
        run: |
          PROVIDER_VALIDATORS=$(gaiad-v28 q comet-validator-set -o json | jq -r '.pagination.total')
          echo "Number of validators: $PROVIDER_VALIDATORS"
          echo "PROVIDER_VALIDATORS=$PROVIDER_VALIDATORS" >> $GITHUB_ENV
      - name: _Validator set check (down)
        run: |
          source ~/env/bin/activate
          python scripts/ics_removal_validator_check.py --height ${{ env.upgrade_height }} --binary gaiad-v28 --api http://localhost:1317 --rpc http://localhost:26657 --provider-max-vals ${{ env.PROVIDER_VALIDATORS }} --ics-removal-upgrade
      - name: Print validator-check json
        run: jq '.' validator-check-${{ env.upgrade_height }}.json

      - name: Prepare for new test
        run: |
          killall gaiad-v28 screen
          sleep 10
          tail /home/runner/artifact/gaiad_test.log
          cd ~
          rm -rf .gaia
          tar xf test-archive.tar
      - name: Start gaiad
        run: |
          screen -L -Logfile /home/runner/artifact/gaiad_upgrade.log -S gaiad -d -m gaiad --home /home/runner/.gaia start
      - name: Wait for gaiad to start and stabilize
        run: |
          tail -f /home/runner/artifact/gaiad_upgrade.log &
          tests/test_block_production.sh 127.0.0.1 26657 10 1000
      - name: Restore val key
        run: |
          echo "Restoring validator key"
          echo "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon art" | gaiad --output json keys add val --keyring-backend test --recover > ~/.gaia/validator.json
      - name: Delegate to validator
        run: |
          echo "Delegate 10ATOM to validator."
          gaiad tx staking delegate cosmosvaloper1r5v5srda7xfth3hn2s26txvrcrntldju7lnwmv 10000000uatom --from val --keyring-backend test --fees 1000000uatom -y
          echo "Wait for the delegation to go on chain..."
          tests/test_block_production.sh 127.0.0.1 26657 1 10
      - name: Submit and vote on the upgrade proposal
        run: |
          set -e
          current_block=$(curl -s 127.0.0.1:26657/block | jq -r .result.block.header.height)
          upgrade_height=$(($current_block+20))
          echo "upgrade_height=$upgrade_height" >> $GITHUB_ENV
          echo "Submitting the upgrade proposal..."
          echo "Upgrade Name set to: ${{ env.UPGRADE_NAME }}"
          echo "Creating json proposal"
          jq ".messages[].plan .height=$upgrade_height | .messages[].plan .name=\"${{ env.UPGRADE_NAME }}\" | .deposit=\"${MIN_DEPOSIT}uatom\"" templates/proposal-software-upgrade.json > upgrade_prop.json
          proposal="gaiad --output json tx gov submit-proposal upgrade_prop.json --gas auto --gas-prices 1000uatom --gas-adjustment 3 --from val --yes"
          txhash=$($proposal | jq -r .txhash)
          echo "Wait for the proposal to go on chain..."
          tests/test_block_production.sh 127.0.0.1 26657 1 1
          echo "Get proposal ID from txhash: $txhash ..."
          gaiad q tx $txhash
          proposal_id=$(gaiad --output json q tx $txhash | jq -r '.events[] | select(.type=="submit_proposal") | .attributes[] | select(.key=="proposal_id") | .value')
          echo "Submitting the \"yes\" vote to proposal $proposal_id..."
