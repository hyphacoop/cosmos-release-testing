      Test-chain-start:
        runs-on: ubuntu-24.04-arm
        # needs: set-versions
        strategy:
          # matrix:
          #   start_version: [ "${{ needs.set-versions.outputs.start_version }}" ]
          #   target_version: [ "${{ needs.set-versions.outputs.target_version }}" ]
          #   upgrade_name: [ "${{ needs.set-versions.outputs.upgrade_name }}" ]
          #   cv_version: [v1.7.1]
          #   upgrade_mechanism: [cv_auto, cv_manual]
          #   enable_cosmovisor: [false, true]
          #   exclude:
          #     - target_version: main
          #       upgrade_mechanism: cv_auto
          #     - enable_cosmovisor: false
          #       upgrade_mechanism: cv_auto
          fail-fast: false
        env:
          # COSMOVISOR: ${{ matrix.enable_cosmovisor }}
          # COSMOVISOR_VERSION: ${{ matrix.cv_version }}
          # UPGRADE_MECHANISM: ${{ matrix.upgrade_mechanism }}
          # BINARY_SOURCE: ${{ needs.set-versions.outputs.binary_source }}
          BINARY_SOURCE: DOWNLOAD
          GO_VERSION: 1.25.7
          GAIA_VERSION: ${{ github.event_name == 'push' && 'v27.3.0-rc0' || inputs.gaia-version }}
        steps:
          - name: Update PATH
            run: |
              mkdir -p $HOME/go/bin
              echo "$HOME/go/bin" >> $GITHUB_PATH
              echo "$HOME/.hermes" >> $GITHUB_PATH
              echo "$HOME/.relayer" >> $GITHUB_PATH
          - name: Bypass the grub-efi-amd64-signed package
            run: sudo apt-mark hold grub-efi-arm64-signed
          - name: Check out repository code
            uses: actions/checkout@v6
          - name: Set up Python
            uses: actions/setup-python@v6
            with:
              python-version: '3.11'
          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              python -m pip install toml-cli
          - name: Start chain
            run: |
              export CHAIN_BINARY_URL=https://github.com/cosmos/gaia/releases/download/$GAIA_VERSION/gaiad-$GAIA_VERSION-linux-arm64  
              source scripts/vars.sh
              scripts/setup.sh
              ./$START_SCRIPT
              sleep $(($COMMIT_TIMEOUT*2))
              tail -n 100 $whale_log
              scripts/wait_for_block.sh 3
              
          - name: _Blocks produced
            run: |
              source scripts/vars.sh
              tests/test_block_production.sh 127.0.0.1 ${rpc_prefix}$COUNT_WIDTH 5

          - name: _Transactions verified> bank send, delegate, and withdraw rewards
            run: |
              source scripts/vars.sh
              tests/test_tx.sh

                  
          - name: _Transactions verified> bank send, delegate, and withdraw rewards
            run: |
              source scripts/vars.sh
              tests/test_tx.sh

          - name: _API endpoints check
            run: |
              source scripts/vars.sh
              tests/test_endpoints_api.sh localhost ${api_prefix}$COUNT_WIDTH

          - name: _RPC endpoints check
            run: |
              source scripts/vars.sh
              tests/test_endpoints_rpc.sh localhost ${rpc_prefix}$COUNT_WIDTH
  
          - name: _Blocks produced
            run: |
              source scripts/vars.sh
              tests/test_block_production.sh 127.0.0.1 ${rpc_prefix}$COUNT_WIDTH 5


      Test-testnet-snapshot:
        runs-on: ubuntu-24.04-arm
        strategy:
          fail-fast: false
        env:
          BINARY_SOURCE: DOWNLOAD
          GO_VERSION: 1.25.7
          GAIA_VERSION: ${{ github.event_name == 'push' && 'v27.3.0-rc0' || inputs.gaia-version }}
        steps:
          - name: Update PATH
            run: |
              mkdir -p $HOME/go/bin
              echo "$HOME/go/bin" >> $GITHUB_PATH
          - name: Bypass the grub-efi-arm64-signed package
            run: sudo apt-mark hold grub-efi-arm64-signed
          - name: Check out repository code
            uses: actions/checkout@v6
          - name: Set up Python
            uses: actions/setup-python@v6
            with:
              python-version: '3.11'
          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              python -m pip install toml-cli

          - name: Start chain
            env:
              NODE_HOME: /home/runner/.gaia
              CHAIN_BINARY: ./gaiad
              GAS_PRICE: 0.005uatom
            run: |
              echo "> Downloading Gaia"
              wget https://github.com/cosmos/gaia/releases/download/$GAIA_VERSION/gaiad-$GAIA_VERSION-linux-arm64 -O $CHAIN_BINARY
              chmod +x $CHAIN_BINARY
              echo "> Initializing node @ $NODE_HOME"
              $CHAIN_BINARY init provider-node --home $NODE_HOME
              sed -i -e "/minimum-gas-prices =/ s^= .*^= \"$GAS_PRICE\"^" $NODE_HOME/config/app.toml
              echo "> Downloading genesis file"
              wget https://github.com/cosmos/testnets/raw/refs/heads/master/provider/provider-genesis.json -O $NODE_HOME/config/genesis.json
              echo "> Setting up seeds"
              toml set --toml-path $NODE_HOME/config/config.toml p2p.seeds "08ec17e86dac67b9da70deb20177655495a55407@provider-seed-01.hub-testnet.polypore.xyz:26656,4ea6e56300a2f37b90e58de5ee27d1c9065cf871@provider-seed-02.hub-testnet.polypore.xyz:26656"
              pwd
              echo "> Downloading and extracting snapshot"
              pushd $NODE_HOME
              wget https://snapshots.polypore.xyz/provider/latest.tar.gz
              tar -xzf latest.tar.gz
              pwd
              popd
              pwd
              tmux new-session -d -s arm-test "$CHAIN_BINARY start --home $NODE_HOME 2>&1 | tee gaia.log"
              sleep 10m
            
          - name: Print log
            run: |
              tail -n 100 gaia.log

          # - name: _Blocks produced
          #   run: |
          #     tests/test_block_production.sh 127.0.0.1 26657 5

      Test-testnet-state-sync:
        runs-on: ubuntu-24.04-arm
        strategy:
          fail-fast: false
        env:
          BINARY_SOURCE: DOWNLOAD
          GO_VERSION: 1.25.7
          GAIA_VERSION: ${{ github.event_name == 'push' && 'v27.3.0-rc0' || inputs.gaia-version }}
        steps:
          - name: Update PATH
            run: |
              mkdir -p $HOME/go/bin
              echo "$HOME/go/bin" >> $GITHUB_PATH
          - name: Bypass the grub-efi-arm64-signed package
            run: sudo apt-mark hold grub-efi-arm64-signed
          - name: Check out repository code
            uses: actions/checkout@v6
          - name: Set up Python
            uses: actions/setup-python@v6
            with:
              python-version: '3.11'
          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              python -m pip install toml-cli

          - name: Start chain
            env:
              NODE_HOME: /home/runner/.gaia
              CHAIN_BINARY: ./gaiad
              GAS_PRICE: 0.005uatom
              STATE_SYNC_RPC_1: https://rpc.provider-state-sync-01.hub-testnet.polypore.xyz:443
              STATE_SYNC_RPC_2: https://rpc.provider-state-sync-02.hub-testnet.polypore.xyz:443
            run: |
              echo "> Downloading Gaia"
              wget https://github.com/cosmos/gaia/releases/download/$GAIA_VERSION/gaiad-$GAIA_VERSION-linux-arm64 -O $CHAIN_BINARY
              chmod +x $CHAIN_BINARY
              echo "> Initializing node @ $NODE_HOME"
              $CHAIN_BINARY init provider-node --home $NODE_HOME
              sed -i -e "/minimum-gas-prices =/ s^= .*^= \"$GAS_PRICE\"^" $NODE_HOME/config/app.toml
              echo "> Downloading genesis file"
              wget https://github.com/cosmos/testnets/raw/refs/heads/master/provider/provider-genesis.json -O $NODE_HOME/config/genesis.json
              echo "> Setting up seeds"
              toml set --toml-path $NODE_HOME/config/config.toml p2p.seeds "08ec17e86dac67b9da70deb20177655495a55407@provider-seed-01.hub-testnet.polypore.xyz:26656,4ea6e56300a2f37b90e58de5ee27d1c9065cf871@provider-seed-02.hub-testnet.polypore.xyz:26656"
              echo "> Setting up state sync"
              current_height=$(curl -s $STATE_SYNC_RPC_1/block | jq -r '.result.block.header.height')
              echo "> Current block height: $current_height"
              trust_height=$[$current_height-1000]
              trust_block=$(curl -s $STATE_SYNC_RPC_1/block\?height\=$trust_height)
              trust_hash=$(echo $trust_block | jq -r '.result.block_id.hash')
              toml set --toml-path $NODE_HOME/config/config.toml statesync.enable true
              toml set --toml-path $NODE_HOME/config/config.toml statesync.trust_period "8h0m0s"
              toml set --toml-path $NODE_HOME/config/config.toml statesync.trust_height $trust_height
              toml set --toml-path $NODE_HOME/config/config.toml statesync.trust_hash $trust_hash
              toml set --toml-path $NODE_HOME/config/config.toml statesync.rpc_servers "$STATE_SYNC_RPC_1,$STATE_SYNC_RPC_2"
              tmux new-session -d -s arm-test "$CHAIN_BINARY start --home $NODE_HOME 2>&1 | tee gaia.log"
              sleep 10m
            
          - name: Print log
            run: |
              tail -n 100 gaia.log

          # - name: _Blocks produced
          #   run: |
          #     tests/test_block_production.sh 127.0.0.1 26657 5
          
          # - name: Print log
          #   run: |
          #     tail -n 100 gaia.log

